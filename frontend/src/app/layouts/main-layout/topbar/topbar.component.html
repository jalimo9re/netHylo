<header class="h-16 glass border-t-0 border-x-0 border-b border-border flex items-center justify-between px-4 sm:px-6 lg:px-8 shadow-sm fixed top-0 left-0 lg:left-64 right-0 z-20">
  <!-- Left: hamburger + search -->
  <div class="flex items-center gap-3 flex-1 min-w-0">
    <!-- Hamburger (mobile only) -->
    <button
      class="lg:hidden p-2 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all flex-shrink-0"
      (click)="menuToggle.emit()"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <!-- Search -->
    <div class="hidden sm:flex items-center gap-3 bg-white/5 border border-border rounded-xl px-4 py-2 flex-1 max-w-md group focus-within:border-primary/50 transition-all">
      <mat-icon class="text-slate-500 text-sm group-focus-within:text-primary transition-colors">search</mat-icon>
      <input
        type="text"
        placeholder="Buscar conversaciones..."
        class="bg-transparent border-none outline-none text-sm w-full text-slate-200 placeholder:text-slate-500"
      />
    </div>
  </div>

  <!-- User menu -->
  <div class="flex items-center gap-3 sm:gap-6 flex-shrink-0">
    <button class="relative p-2 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all">
      <mat-icon>notifications</mat-icon>
      <span class="absolute top-2 right-2 w-2 h-2 bg-accent rounded-full border-2 border-background"></span>
    </button>

    <div class="flex items-center gap-2 sm:gap-3 pl-3 sm:pl-6 border-l border-border h-8 cursor-pointer group">
      <div class="w-9 h-9 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center text-white text-sm font-bold shadow-lg shadow-primary/20 group-hover:scale-105 transition-transform flex-shrink-0">
        {{ userEmail.charAt(0).toUpperCase() }}
      </div>
      <div class="hidden md:flex flex-col">
        <span class="text-sm font-semibold text-slate-100 leading-tight">{{ userEmail.split('@')[0] }}</span>
        <span class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">{{ userRole }}</span>
      </div>
      <button (click)="logout()" class="p-2 text-slate-500 hover:text-rose-400 hover:bg-rose-400/10 rounded-xl transition-all" title="Cerrar sesión">
        <mat-icon class="text-[20px]">logout</mat-icon>
      </button>
    </div>
  </div>
</header>
