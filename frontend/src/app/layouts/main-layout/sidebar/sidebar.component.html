<aside class="w-64 h-screen glass border-r-0 text-white flex flex-col left-0 top-0">
  <!-- Logo -->
  <div class="h-16 flex items-center justify-between px-6 border-b border-border">
    <span class="text-2xl font-bold tracking-tight gradient-text font-display">netHylo</span>
    <button class="lg:hidden p-1 text-slate-400 hover:text-white" (click)="onNavClick()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 py-6 overflow-y-auto">
    @for (item of navItems(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-white/10 text-white border-r-4 border-primary"
        (click)="onNavClick()"
        class="flex items-center gap-4 px-6 py-3.5 text-sm font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all duration-200 group"
      >
        <mat-icon class="text-xl group-hover:scale-110 transition-transform">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Footer -->
  <div class="p-6 border-t border-border text-xs text-slate-500 font-medium tracking-wide flex items-center gap-2">
    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
    netHylo v0.1.0
  </div>
</aside>
