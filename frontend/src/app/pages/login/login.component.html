<div class="min-h-screen flex items-center justify-center bg-background relative overflow-hidden">
  <!-- Decorative Background Elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full"></div>

  <div class="w-full max-w-md px-6 z-10">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-black mb-3 tracking-tighter gradient-text font-display">netHylo</h1>
      <p class="text-slate-400 font-medium">Gestiona tus mensajes como un profesional</p>
    </div>

    <div class="glass p-8 rounded-3xl shadow-2xl shadow-black/50 border-white/5 relative">
      <div class="absolute top-0 right-8 transform -translate-y-1/2">
        <div class="bg-primary px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-white shadow-lg shadow-primary/40">
          v0.1.0 Beta
        </div>
      </div>

      <h2 class="text-xl font-bold mb-1 text-slate-100">Bienvenido de nuevo</h2>
      <p class="text-sm text-slate-500 mb-8">Introduce tus credenciales para acceder</p>

      @if (error) {
        <div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 px-4 py-3 rounded-2xl mb-6 text-sm flex items-center gap-2">
          <mat-icon class="text-sm">error_outline</mat-icon>
          {{ error }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Email</label>
          <div class="relative group">
            <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-lg">mail_outline</mat-icon>
            <input 
              type="email" 
              [(ngModel)]="email" 
              name="email" 
              required 
              placeholder="tu@email.com"
              class="w-full bg-white/5 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-slate-200 outline-none focus:border-primary/50 focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-600"
            />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-slate-400 ml-1 uppercase tracking-wider">Contraseña</label>
          <div class="relative group">
            <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-lg">lock_outline</mat-icon>
            <input 
              type="password" 
              [(ngModel)]="password" 
              name="password" 
              required 
              placeholder="••••••••"
              class="w-full bg-white/5 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-slate-200 outline-none focus:border-primary/50 focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-600"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading || !email || !password"
          class="w-full mt-4 bg-gradient-to-r from-primary to-secondary hover:from-primary-600 hover:to-secondary text-white font-bold py-3.5 rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:scale-100 disabled:cursor-not-allowed text-sm"
        >
          {{ loading ? 'Iniciando sesión...' : 'Entrar en netHylo' }}
        </button>
      </form>
      
      <div class="mt-8 text-center text-xs text-slate-500 font-medium">
        ¿No tienes cuenta? <a href="#" class="text-primary hover:text-primary-400 font-bold transition-colors">Solicitar acceso</a>
      </div>
    </div>
  </div>
</div>
