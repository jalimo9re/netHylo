<div>
  <h2 class="text-3xl font-bold mb-10 font-display tracking-tight text-white">Dashboard</h2>

  <!-- Stats Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-8 mb-12">
    @for (stat of stats; track stat.label) {
      <div class="glass p-6 rounded-3xl hover:scale-[1.02] transition-all cursor-default group border-white/5 shadow-xl shadow-black/20">
        <div class="flex items-center gap-5">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center border border-white/10 group-hover:border-primary/50 transition-colors">
            <mat-icon class="text-primary text-2xl">{{ stat.icon }}</mat-icon>
          </div>
          <div>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">{{ stat.label }}</p>
            <p class="text-3xl font-black text-white tracking-tighter">{{ stat.value }}</p>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Recent Activity -->
  <div class="glass p-10 rounded-3xl border-white/5">
    <div class="flex items-center justify-between mb-8">
      <h3 class="text-xl font-bold text-white font-display">Actividad reciente</h3>
      <button class="text-sm font-bold text-primary hover:text-primary-400 transition-colors">Ver todo</button>
    </div>
    <div class="flex flex-col items-center justify-center py-16 text-center border-2 border-dashed border-white/5 rounded-2xl">
      <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6">
        <mat-icon class="text-slate-600 text-4xl">history</mat-icon>
      </div>
      <p class="text-slate-400 font-medium text-lg mb-2">No hay actividad reciente</p>
      <p class="text-slate-600 text-sm max-w-xs">Tus interacciones aparecerán aquí una vez que conectes tus canales de comunicación.</p>
    </div>
  </div>
</div>
