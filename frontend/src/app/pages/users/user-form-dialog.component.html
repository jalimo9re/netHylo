<h2 mat-dialog-title class="!mb-1">{{ isEdit ? 'Editar' : 'Nuevo' }} usuario</h2>

<mat-dialog-content class="flex flex-col gap-5 py-4">
  @if (error) {
    <div class="bg-rose-500/15 border border-rose-500/30 text-rose-300 px-4 py-3 rounded-xl text-sm">
      {{ error }}
    </div>
  }

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Nombre</label>
      <div class="flex items-center gap-3 bg-white/5 border border-border rounded-xl px-4 py-2.5 focus-within:border-primary/50 transition-all">
        <input
          [(ngModel)]="firstName"
          class="bg-transparent border-none outline-none text-sm w-full text-slate-200 placeholder:text-slate-500"
        />
      </div>
    </div>

    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Apellidos</label>
      <div class="flex items-center gap-3 bg-white/5 border border-border rounded-xl px-4 py-2.5 focus-within:border-primary/50 transition-all">
        <input
          [(ngModel)]="lastName"
          class="bg-transparent border-none outline-none text-sm w-full text-slate-200 placeholder:text-slate-500"
        />
      </div>
    </div>
  </div>

  <div class="space-y-1.5">
    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Email</label>
    <div class="flex items-center gap-3 bg-white/5 border border-border rounded-xl px-4 py-2.5 focus-within:border-primary/50 transition-all">
      <input
        type="email"
        [(ngModel)]="email"
        [disabled]="isEdit"
        class="bg-transparent border-none outline-none text-sm w-full text-slate-200 placeholder:text-slate-500 disabled:opacity-60"
      />
    </div>
  </div>

  @if (!isEdit) {
    <div class="space-y-1.5">
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Contrasena</label>
      <div class="flex items-center gap-3 bg-white/5 border border-border rounded-xl px-4 py-2.5 focus-within:border-primary/50 transition-all">
        <input
          type="password"
          [(ngModel)]="password"
          class="bg-transparent border-none outline-none text-sm w-full text-slate-200 placeholder:text-slate-500"
        />
      </div>
      <p class="text-xs text-slate-500 ml-1">Minimo 8 caracteres</p>
    </div>
  }

  <div class="space-y-1.5">
    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">Rol</label>
    <div class="bg-white/5 border border-border rounded-xl px-3 py-1.5 focus-within:border-primary/50 transition-all">
      <mat-select [(ngModel)]="role" panelClass="nethylo-select-panel" class="w-full">
        @for (r of roles; track r.value) {
          <mat-option [value]="r.value">{{ r.label }}</mat-option>
        }
      </mat-select>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!pt-4">
  <button mat-button class="!text-slate-300 hover:!bg-white/10" (click)="cancel()">Cancelar</button>
  <button
    class="bg-primary hover:bg-primary-600 text-white font-bold py-2.5 px-4 rounded-xl shadow-lg shadow-primary/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
    [disabled]="!isValid() || loading"
    (click)="save()"
  >
    {{ loading ? 'Guardando...' : (isEdit ? 'Guardar cambios' : 'Crear usuario') }}
  </button>
</mat-dialog-actions>
