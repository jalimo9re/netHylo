<h2 mat-dialog-title>{{ isEdit ? 'Editar' : 'Nuevo' }} usuario</h2>

<mat-dialog-content class="flex flex-col gap-4 py-4">
  @if (error) {
    <div class="bg-red-50 text-red-700 px-4 py-3 rounded-lg text-sm">{{ error }}</div>
  }

  <div class="flex gap-4">
    <mat-form-field appearance="outline" class="flex-1">
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="firstName" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="flex-1">
      <mat-label>Apellidos</mat-label>
      <input matInput [(ngModel)]="lastName" />
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline">
    <mat-label>Email</mat-label>
    <input matInput type="email" [(ngModel)]="email" [disabled]="isEdit" />
  </mat-form-field>

  @if (!isEdit) {
    <mat-form-field appearance="outline">
      <mat-label>Contraseña</mat-label>
      <input matInput type="password" [(ngModel)]="password" />
      <mat-hint>Minimo 8 caracteres</mat-hint>
    </mat-form-field>
  }

  <mat-form-field appearance="outline">
    <mat-label>Rol</mat-label>
    <mat-select [(ngModel)]="role">
      @for (r of roles; track r.value) {
        <mat-option [value]="r.value">{{ r.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button
    mat-raised-button
    color="primary"
    [disabled]="!isValid() || loading"
    (click)="save()"
  >
    {{ loading ? 'Guardando...' : (isEdit ? 'Guardar cambios' : 'Crear usuario') }}
  </button>
</mat-dialog-actions>
